services:
  - type: web
    name: multitenant-api
    env: docker
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: multitenant-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 14400

databases:
  - name: multitenant-db
    databaseName: saas_platform
    user: postgres
